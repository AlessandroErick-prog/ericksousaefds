<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscrição JIES</title>
<!-- CSS internal style -->
    <style>
      body {
        background-color: lightgrey;
        font-family: "Courier New", Courier, monospace;
        /* font-family: 'Times New Roman', Times, serif; */
        /* font-family: 'Courier New', Courier, monospace; */
        }
    </style>
  </head>

  <body>
    <form>
      <section>
        <!-- CSS inline style -->
        <h1 style="color: white; background-color: blue">
          Cadastro de Participantes do JIES
        </h1>
        <label>Nome completo:</label>
        <input type="text" name="nome" /><br /><br />

        <label>Senha de acesso:</label>
        <input type="password" name="senha" /><br /><br />

        <label>Modalidade principal:</label>
        <select>
          <option>Selecione uma modalidade</option>
          <option>Futsal</option>
          <option>Vôlei</option>
          <option>Basquete</option>
          <option>Handebol</option>
          <option>Atletismo</option>
        </select>
        <br /><br />

        <label>Turno:</label>
        <br />
        <input type="radio" name="turno" /> Manhã
        <input type="radio" name="turno" /> Tarde
        <input type="radio" name="turno" /> Noite <br /><br />

        <label>Observações:</label>
        <br />
        <textarea></textarea>
        <br /><br />

        <br />
        <button type="submit">Enviar inscrição</button>
      </section>
    </form>

    <hr />

    <h2>Participantes já inscritos</h2>

<!-- Tabela com dados fictícios -->

      <tr>
        <th>Nome</th>
        <th>Modalidade</th>

        <th>Status</th>

      </tr>
    </table>
  </body>
</html>
